# Serves the built React SPA. It only serves static files: the browser calls
# the backend Container App's public URL directly (baked in as VITE_API_URL at
# build time), so nginx never proxies the API.
#
# That is deliberate. Proxying the API through nginx would put a buffering
# reverse proxy in front of an SSE stream, and nginx buffers responses by
# default — the pipeline's step events would arrive in one burst at the end
# instead of streaming, silently destroying the live progress UI. Keeping
# nginx out of the API path removes that failure mode entirely, at the cost of
# needing CORS_ORIGINS set on the backend.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # react-router uses client-side routing: /traces and /evaluate are not real
    # files. Without this fallback, a refresh on any route but / returns 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets are immutable; index.html must never be cached or
    # clients keep booting the previous deploy's asset graph.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    gzip              on;
    gzip_types        text/css application/javascript application/json image/svg+xml;
    gzip_min_length   1024;
}
